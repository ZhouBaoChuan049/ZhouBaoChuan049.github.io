name: Deploy to GitHub Pages

on:
  # 确保这里匹配你图片中显示的 master 分支
  push:
    branches: [ master ]
  # 允许手动触发
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4

      # 自动识别你的 pnpm 环境
      - name: Install, build, and upload your site
        uses: withastro/action@v3
        with:
          # 让 Astro 自动根据你的 pnpm-lock.yaml 处理依赖
          path: . 

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
